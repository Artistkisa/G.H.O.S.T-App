name: ghost_app
description: G.H.O.S.T mobile client

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^2.4.0
  dio: ^5.4.0
  flutter_markdown: ^0.6.18
  image_picker: ^1.0.7
  file_picker: ^6.1.0
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.2

# 强制使用兼容 Kotlin 1.7 的旧版 Android 实现
dependency_overrides:
  shared_preferences_android: 2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
