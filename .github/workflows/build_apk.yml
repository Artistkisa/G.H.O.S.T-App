name: Build APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
          channel: stable

      - name: Generate Android project
        run: |
          git stash
          flutter create --overwrite --project-name ghost_app --platforms android .
          git checkout HEAD -- lib/ pubspec.yaml
          git stash pop || true

      - name: Fix Android SDK & pin dependencies
        run: |
          # Pin compileSdk/targetSdk to 34
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 34/g' android/app/build.gradle
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 34/g' android/app/build.gradle
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' android/app/build.gradle
          # Pin shared_preferences to avoid Kotlin 1.9 requirement
          sed -i 's/shared_preferences: \^2.2.2/shared_preferences: 2.2.2/g' pubspec.yaml
          cat android/app/build.gradle | grep -E 'compileSdk|targetSdk|minSdk'
          cat pubspec.yaml | grep shared_preferences

      - name: Clean broken Android SDK 35
        run: |
          # GitHub Actions runner has a corrupted android-35 platform; remove it
          rm -rf /usr/local/lib/android/sdk/platforms/android-35

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ghost-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
