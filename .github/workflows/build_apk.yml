name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Generate Android project
        run: |
          git stash
          flutter create --platforms android --overwrite --project-name ghost_app .
          git checkout HEAD -- lib/ pubspec.yaml
          git stash pop || true

      - name: Fix Android SDK & Kotlin compatibility
        run: |
          # Fix compileSdk/targetSdk (flutter.create uses '=' syntax)
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 34/g' android/app/build.gradle
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 34/g' android/app/build.gradle
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' android/app/build.gradle
          # Upgrade Kotlin to 1.9.10 (shared_preferences_android 2.4.7 requires it)
          sed -i 's/id "org.jetbrains.kotlin.android" version "1.7.10"/id "org.jetbrains.kotlin.android" version "1.9.10"/g' android/settings.gradle
          sed -i 's/id "org.jetbrains.kotlin.android" version "1.8.22"/id "org.jetbrains.kotlin.android" version "1.9.10"/g' android/settings.gradle
          # Upgrade Gradle wrapper to 8.4 (required for Kotlin 1.9)
          sed -i 's/gradle-7.6.3-all.zip/gradle-8.4-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties
          cat android/app/build.gradle | grep -E 'compileSdk|targetSdk|minSdk'
          cat android/settings.gradle | grep kotlin
          cat android/gradle/wrapper/gradle-wrapper.properties | grep distributionUrl

      - name: Clean Gradle cache
        run: cd android && ./gradlew clean || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ghost-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk
