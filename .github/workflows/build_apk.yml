name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Generate Android project
        run: |
          git stash
          flutter create --platforms android --overwrite --project-name ghost_app .
          git checkout HEAD -- lib/ pubspec.yaml
          git stash pop || true

      - name: Fix Android SDK & Kotlin compatibility
        run: |
          # Fix compileSdk/targetSdk (flutter.create uses '=' syntax)
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 34/g' android/app/build.gradle
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 34/g' android/app/build.gradle
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/g' android/app/build.gradle
          # Update Kotlin version in settings.gradle
          sed -i 's/org.jetbrains.kotlin.android\">1.7.10/org.jetbrains.kotlin.android\">1.9.10/g' android/settings.gradle
          sed -i 's/org.jetbrains.kotlin.android\">1.8.22/org.jetbrains.kotlin.android\">1.9.10/g' android/settings.gradle
          cat android/app/build.gradle | grep -E 'compileSdk|targetSdk|minSdk'
          cat android/settings.gradle | grep kotlin

      - name: Clean Gradle cache
        run: cd android && ./gradlew clean || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ghost-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk
